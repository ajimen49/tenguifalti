<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANAGER ADRENALYN XL 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#111;color:#fff}

header{position:sticky;top:0;background:#222;padding:10px;z-index:10}
h1{font-size:18px;margin-bottom:6px}

/* SEARCH */
.search-wrapper{position:relative}
.search-wrapper input{
  width:100%;
  padding:10px 35px 10px 10px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
  font-size:16px; /* evita zoom iOS */
}
.clear-btn{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:16px;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.controls select{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
  font-size:16px;
}

/* BOTONS */
.market-bar{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}
.market-bar button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
  padding:8px;
}

.card{
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  padding:4px;
}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

.card small{font-size:8px;opacity:.8}

/* KEYPAD */
.kp-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
.kp-grid button{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#444;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.open{display:flex}
.modal-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:80%;
}
.modal-box button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
}
</style>
</head>

<body>

<header>

<h1>MANAGER ADRENALYN XL 2026</h1>

<div class="market-bar">
<button onclick="setMode('album')">📘 Àlbum</button>
<button onclick="setMode('market')">🤝 Intercanvi</button>
<button onclick="openExport()">📤 Exportar</button>
</div>

<div class="search-wrapper">
<input id="search" placeholder="Cerca...">
<button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<div class="controls">
<select id="filter">
<option value="all">Estat</option>
<option value="green">Tinc</option>
<option value="orange">Repetides</option>
<option value="red">Falten</option>
</select>

<select id="typeFilter">
<option value="all">Tipus</option>
<option value="base">Base</option>
<option value="vamos">Vamos</option>
<option value="influencers">Influencers</option>
<option value="protas">Protas</option>
<option value="supercrack">Supercrack</option>
<option value="diamantes">Diamantes</option>
<option value="kryptonita">Kryptonita</option>
<option value="momentum">Momentum</option>
<option value="limitada">Limitada</option>
</select>
</div>

<!-- KEYPAD -->
<div id="keypad" style="display:none;">
  <div class="kp-grid">
    <button onclick="kp('1')">1</button>
    <button onclick="kp('2')">2</button>
    <button onclick="kp('3')">3</button>

    <button onclick="kp('4')">4</button>
    <button onclick="kp('5')">5</button>
    <button onclick="kp('6')">6</button>

    <button onclick="kp('7')">7</button>
    <button onclick="kp('8')">8</button>
    <button onclick="kp('9')">9</button>

    <button onclick="kp(' / ')">/</button>
    <button onclick="kp('0')">0</button>
    <button onclick="kp(' - ')">-</button>

    <button onclick="kp(', ')">,</button>
    <button onclick="kpBack()">⌫</button>
    <button onclick="clearSearch()">CLR</button>
  </div>
</div>

</header>

<div class="grid" id="grid"></div>

<!-- MODAL EXPORT -->
<div class="modal" id="exportModal">
  <div class="modal-box">
    <button onclick="exportMissing()">FALTEN</button>
    <button onclick="exportRepeats()">REPETIDES</button>
    <button onclick="closeExport()">CANCEL·LA</button>
  </div>
</div>

<script>

// 👉 enganxa aquí les cartes
// const cards = []

const state = JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}

// MODE
let mode="album";

function setMode(m){
  mode=m;

  const input=document.getElementById('search');
  input.value='';
  input.blur();

  document.getElementById('keypad').style.display =
    m==="market" ? "block" : "none";

  render();
}

// evitar teclat natiu
document.getElementById('search').addEventListener('focus', ()=>{
  if(mode==="market") document.getElementById('search').blur();
});

// CERCA
function clearSearch(){
  const i=document.getElementById('search');
  i.value='';
  i.blur();
  render();
}

// KEYPAD
function kp(v){
  const i=document.getElementById('search');
  i.value+=v;
  render();
}
function kpBack(){
  const i=document.getElementById('search');
  i.value=i.value.slice(0,-1);
  render();
}

// TIPUS
function getType(c){
  const n=parseInt(c.id);
  if(!isNaN(n)){
    if(n<=360)return'base';
    if(n<=380)return'vamos';
    if(n<=423)return'influencers';
    if(n<=441)return'protas';
    if(n<=467)return'supercrack';
  }
  if(c.name.includes("Momentum"))return'momentum';
  if(c.name.includes("Limitada"))return'limitada';
  return'base';
}

// CICLE
function cycle(id){
  const s=getState(id);
  state[id]=s==='red'?'green':s==='green'?'orange':'red';
  save();

  if(document.getElementById('search').value){
    clearSearch();
  }

  render();
}

// EXPORT
function openExport(){
  document.getElementById('exportModal').classList.add('open');
}
function closeExport(){
  document.getElementById('exportModal').classList.remove('open');
}
function share(t){
  navigator.share?navigator.share({text:t}):alert(t);
}
function exportMissing(){
  share("Falten:\n"+cards.filter(c=>getState(c.id)==='red').map(c=>c.id).join(", "));
  closeExport();
}
function exportRepeats(){
  share("Repetides:\n"+cards.filter(c=>getState(c.id)==='orange').map(c=>c.id).join(", "));
  closeExport();
}

// RENDER
function render(){

  const grid=document.getElementById('grid');
  grid.innerHTML="";

  const search=document.getElementById('search').value.toLowerCase();
  const filter=document.getElementById('filter').value;
  const type=document.getElementById('typeFilter').value;

  const nums=search.split(/[,\-\/]/).map(n=>n.trim()).filter(Boolean);

  cards.forEach(c=>{
    const st=getState(c.id);

    // MODE MERCAT → només si hi ha números
    if(mode==="market"){
      if(!nums.length) return;
      if(!nums.includes(c.id)) return;
    }

    // MODE ÀLBUM
    if(mode==="album" && filter!=='all' && st!==filter) return;
    if(type!=='all' && getType(c)!==type) return;

    if(mode==="album" && search && !c.name.toLowerCase().includes(search) && !c.id.includes(search)) return;

    const div=document.createElement('div');
    div.className='card '+st;

    // 🔥 visual subtil
    if(mode==="market" && st==="red") div.style.opacity=0.5;

    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);

    grid.appendChild(div);
  });
}

document.getElementById('search').addEventListener('input',render);
document.getElementById('filter').addEventListener('change',render);
document.getElementById('typeFilter').addEventListener('change',render);

render();

</script>

</body>
</html>
