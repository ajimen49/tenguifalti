<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENGUI / REPE / FALTI XL 2026</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

header {
  position:sticky;
  top:0;
  background:#222;
  padding:10px;
  z-index:10;
}

h1 {
  font-size:18px;
  margin:0 0 8px 0;
}

.controls {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:none;
}

.stats {
  display:flex;
  gap:8px;
  margin-top:6px;
  font-size:12px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(70px,1fr));
  gap:6px;
  padding:8px;
}

.card {
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:11px;
  cursor:pointer;
  user-select:none;
}

.red { background:#e74c3c; }
.orange { background:#f39c12; }
.green { background:#2ecc71; }

.card small {
  font-size:9px;
  opacity:.8;
  text-align:center;
}

.sheet {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#222;
  padding:15px;
  display:none;
}

.sheet.open { display:block; }
</style>
</head>

<body>

<header>
  <h1>TENGUI / REPE / FALTI XL 2026</h1>

  <div class="controls">
    <input id="search" placeholder="Cerca jugador o club">
    <select id="filter">
      <option value="all">Totes</option>
      <option value="green">Tinc</option>
      <option value="orange">Repetides</option>
      <option value="red">Falten</option>
    </select>
  </div>

  <div class="stats">
    🟢 <span id="g">0</span>
    🟠 <span id="o">0</span>
    🔴 <span id="r">0</span>
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="sheet" id="sheet">
  <h3 id="sheetTitle"></h3>
  <button onclick="setState('red')">❌ Falta</button>
  <button onclick="setState('orange')">🔁 Repetida</button>
  <button onclick="setState('green')">✅ Tinc</button>
  <br><br>
  <button onclick="closeSheet()">Tancar</button>
</div>

<script>

// 🔥 DADES (pots enganxar totes les cartes aquí)
const cards = [
  {id:"1", name:"Escudo Alavés"},
  {id:"2", name:"Sivera"},
  {id:"3", name:"Raúl Fernández"},
  {id:"4", name:"Jonny"},
  {id:"5", name:"Tenaglia"}
];

// estat guardat
const state = JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){
  return state[id] || "red";
}

function save(){
  localStorage.setItem("cards", JSON.stringify(state));
}

function cycle(id){
  const s = getState(id);
  let next = s==="red"?"orange":s==="orange"?"green":"red";
  state[id]=next;
  save();
  render();
}

let selected=null;

function openSheet(card){
  selected=card.id;
  document.getElementById("sheetTitle").innerText = card.id+" - "+card.name;
  document.getElementById("sheet").classList.add("open");
}

function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
}

function setState(s){
  state[selected]=s;
  save();
  render();
  closeSheet();
}

// render
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let g=0,o=0,r=0;

  const search=document.getElementById("search").value.toLowerCase();
  const filter=document.getElementById("filter").value;

  cards.forEach(c=>{
    const st=getState(c.id);

    if(filter!=="all" && st!==filter) return;
    if(search && !c.name.toLowerCase().includes(search)) return;

    if(st==="green") g++;
    else if(st==="orange") o++;
    else r++;

    const div=document.createElement("div");
    div.className="card "+st;

    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;

    // 👇 TOUCH CONTROL
    let timer=null;

    div.addEventListener("touchstart", ()=>{
      timer=setTimeout(()=>{
        openSheet(c);
        timer=null;
      },400);
    });

    div.addEventListener("touchend", ()=>{
      if(timer){
        clearTimeout(timer);
        cycle(c.id);
      }
    });

    div.addEventListener("touchmove", ()=>{
      clearTimeout(timer);
    });

    // desktop
    div.addEventListener("click", ()=>cycle(c.id));
    div.addEventListener("contextmenu", e=>{
      e.preventDefault();
      openSheet(c);
    });

    grid.appendChild(div);
  });

  document.getElementById("g").innerText=g;
  document.getElementById("o").innerText=o;
  document.getElementById("r").innerText=r;
}

document.getElementById("search").oninput=render;
document.getElementById("filter").onchange=render;

render();

</script>

</body>
</html>
