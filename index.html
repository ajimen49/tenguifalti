<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADRENALYN XL 2025-2026</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
:root{
  --bg:#0e1117;
  --surface:#151a24;
  --surface-soft:#1c2331;
  --surface-strong:#252f42;
  --text:#f8fafc;
  --muted:#98a2b3;
  --accent:#6ea8fe;
  --radius:10px;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  font-family:'Roboto',sans-serif;
  background:radial-gradient(circle at top,#1a2233 0%,var(--bg) 45%);
  color:var(--text);
  min-height:100vh;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:4px;
  background:rgba(14,17,23,.9);
  backdrop-filter:blur(4px);
}

.header-block{
  height:44px;
  display:flex;
  align-items:center;
  padding:0;
  background:transparent;
  border:none;
  box-shadow:none;
  border-radius:0;
}
.header-block > *{width:100%}

/* LOGO */
.logo{
  height:100%;
  display:flex;
  align-items:center;
  padding:4px 0;
}
.logo img{
  height:100%;
  max-height:36px;
}

/* ROW */
.header-row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  display:flex;
  align-items:center;
  gap:4px;
  font-weight:bold;
  font-size:14px;
}

.stat{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:40px;
  cursor:pointer;
  padding:4px 4px;
  border-radius:8px;
  transition:background .2s ease;
}
.stat:hover{background:#222a3a}

.stat i{
  width:12px;height:12px;border-radius:3px;
}

.t{color:#ecf0f1}
.g{color:#27ae60}
.o{color:#d07a18}
.r{color:#c0392b}

.t i{background:#ecf0f1}
.g i{background:#27ae60}
.o i{background:#d07a18}
.r i{background:#c0392b}

/* MODES */
.market-bar{
  width:100%;
  display:flex;
  gap:6px;
}
.market-bar button{
  flex:1;
  height:40px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-strong);
  color:var(--text);
  font-weight:bold;
  letter-spacing:.2px;
  cursor:pointer;
  transition:all .2s ease;
}
.market-bar button.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(110,168,254,.25);
}
.market-bar button:hover{
  transform:translateY(-1px);
  background:#2f3c54;
}

/* FILTERS */
.controls{
  width:100%;
  display:flex;
  gap:6px;
}

.controls select{
  flex:1;
  height:40px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-soft);
  color:var(--text);
  font-size:15px;
  padding:0 40px 0 10px;

  appearance:none;
  -webkit-appearance:none;

  background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
}

/* SEARCH */
.search-wrapper{
  width:100%;
  position:relative;
}

#search{
  width:100%;
  min-height:40px;
  max-height:120px;
  padding:10px 35px 10px 10px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-soft);
  color:var(--text);
  font-size:15px;
  resize:none;
  overflow-y:auto;
  line-height:1.25;
}

#search::placeholder{
  color:var(--muted);
}

.clear-btn{
  display:none;
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:18px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(78px,1fr));
  gap:8px;
  padding:10px;
}

#keypad{
  display:none;
  padding:8px;
  background:rgba(14,17,23,.95);
  border-top:1px solid #2a3242;
}

body.market-mode #keypad{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:20;
}

body.market-mode .grid{
  padding-bottom:180px;
}

.kp-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
}

.kp-grid button{
  height:40px;
  border:1px solid #3a455c;
  border-radius:6px;
  background:var(--surface-strong);
  color:var(--text);
  font-weight:700;
  cursor:pointer;
}
.kp-grid button:hover{background:#2f3c54}

.card{
  aspect-ratio:1;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:6px;
  text-align:center;
  user-select:none;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 6px 14px rgba(0,0,0,.25);
  transition:transform .15s ease,box-shadow .15s ease;
}

.card:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 18px rgba(0,0,0,.35);
}

.card b{font-size:14px}
.card small{font-size:10px;padding:0 4px;line-height:1.2}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

/* MODAL */
.modal{
  position:fixed;
  left:0;
  right:0;
  top:var(--modal-top,0px);
  bottom:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:10px;
  z-index:30;
}
.modal.open{display:flex}

.modal-box{
  background:var(--surface);
  padding:20px;
  border-radius:12px;
  width:min(520px,92vw);
  max-height:90vh;
  overflow-y:auto;
  border:1px solid #2a3242;
}

.modal-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.btn-export{background:#9ad2ff;color:#001427}
.btn-import{background:#92f7b6;color:#08361b}
.btn-cancel{
  background:#555;
  color:#fff;
  appearance:none;
  -webkit-appearance:none;
}

#qrOut{
  margin-top:10px;
  display:flex;
  justify-content:center;
  min-height:130px;
}

#qrReader{
  margin-top:10px;
  min-height:220px;
}

</style>
</head>

<header>

<div class="header-block">
  <div class="header-row">
    <div class="logo">
      <img src="img/adrenalyn_logo.png">
    </div>

    <div class="stats">
      <span class="stat t" onclick="quickFilter('all')"><i></i><span id="countT">0</span></span>
      <span class="stat g" onclick="quickFilter('green')"><i></i><span id="countG">0</span></span>
      <span class="stat o" onclick="quickFilter('orange')"><i></i><span id="countO">0</span></span>
      <span class="stat r" onclick="quickFilter('red')"><i></i><span id="countR">0</span></span>
    </div>
  </div>
</div>

<div class="header-block">
  <div class="market-bar">
    <button id="btnAlbum" onclick="setMode('album')">📘 ÀLBUM</button>
    <button id="btnMarket" onclick="setMode('market')">🤝 CANVIS</button>
    <button onclick="openData()">💾 DADES</button>
  </div>
</div>

<div class="header-block">
  <div class="controls">
    <select id="filter" onchange="render()">
      <option value="all">Totes</option>
      <option value="green">Tinc</option>
      <option value="orange">Repetides</option>
      <option value="red">Falten</option>
    </select>

    <select id="typeFilter" onchange="render()">
      <option value="all">Tipus</option>
      <option value="base">Base</option>
      <option value="vamos">Vamos</option>
      <option value="guantes">Guantes</option>
      <option value="kryptonita">Kryptonita</option>
      <option value="diamantes">Diamantes</option>
      <option value="influencers">Influencers</option>
      <option value="protas">Protas</option>
      <option value="nuevo-protas">Nuevo Protas</option>
      <option value="supercrack">Supercrack</option>
      <option value="champions">Champions</option>
      <option value="balonoro">Balón Oro</option>
      <option value="momentum">Momentum</option>
      <option value="limitada">Limitada</option>
      <option value="autografo">Autógrafos</option>
      <option value="total-kings">Total Kings</option>
      <option value="new-master">New Master</option>
    </select>
  </div>
</div>

<div class="header-block">
  <div class="search-wrapper">
    <textarea id="search" rows="1" placeholder="Cerca per número o nom..." oninput="autoGrowSearch();render();toggleClearBtn()"></textarea>
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

</header>

<div id="keypad">
  <div class="kp-grid">
    <button onclick="kp('1')">1</button>
    <button onclick="kp('2')">2</button>
    <button onclick="kp('3')">3</button>
    <button onclick="kp('4')">4</button>
    <button onclick="kp('5')">5</button>
    <button onclick="kp('6')">6</button>
    <button onclick="kp('7')">7</button>
    <button onclick="kp('8')">8</button>
    <button onclick="kp('9')">9</button>
    <button onclick="kp(' / ')">/</button>
    <button onclick="kp('0')">0</button>
    <button onclick="kpBack()">⌫</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="dataModal">
  <div class="modal-box">
    <button class="btn-export btn-text" onclick="exportText()">Exporta text (tot)</button>
    <button class="btn-export btn-qr" onclick="exportQR()">Exporta QR (tot)</button>
    <button class="btn-import btn-text" onclick="importText()">Importa text (tot)</button>
    <button class="btn-import btn-qr" onclick="importQR()">Importa QR (tot)</button>
    <button class="btn-cancel" onclick="closeData()">CANCEL·LA</button>
    <div id="qrOut"></div>
    <div id="qrReader"></div>
  </div>
</div>

let mode="album";
const state=JSON.parse(localStorage.getItem("cards")||"{}");
let saveTimer=null;

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}
function queueSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(save,120);
}
function autoGrowSearch(){
  search.style.height="auto";
  search.style.height=Math.min(search.scrollHeight,120)+"px";
}
function updateTotals(){
  const totals=cards.reduce((acc,c)=>{
    const st=getState(c.id);
    acc[st]=(acc[st]||0)+1;
    return acc;
  },{green:0,orange:0,red:0});
  countT.textContent=cards.length;
  countG.textContent=totals.green;
  countO.textContent=totals.orange;
  countR.textContent=totals.red;
}

function setMode(m){
  mode=m;
  btnAlbum.classList.toggle('active',m==='album');
  btnMarket.classList.toggle('active',m==='market');
  keypad.style.display=m==='market' ? "block" : "none";
  document.body.classList.toggle("market-mode",m==="market");
  search.value="";
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function quickFilter(f){
  setMode("album");
  filter.value=f;
  search.value="";
  render();
}

function clearSearch(){
  search.value="";
  autoGrowSearch();
  filter.value="all";
  typeFilter.value="all";
  setMode("album");
  toggleClearBtn();
  render();
}

function toggleClearBtn(){
  document.querySelector('.clear-btn').style.display =
    search.value.trim() ? "block":"none";
}

function getType(card){
  const n=card.name.toLowerCase();
  if(n.includes("¡vamos")) return "vamos";
  if(n.includes("guantes de oro")) return "guantes";
  if(n.includes("kryptonita")) return "kryptonita";
  if(n.includes("diamante")) return "diamantes";
  if(n.includes("influencer")) return "influencers";
  if(n.includes("nuevo prota")) return "nuevo-protas";
  if(n.includes("prota")) return "protas";
  if(n.includes("supercrack")) return "supercrack";
  if(n.includes("champions")) return "champions";
  if(n.includes("balón de oro") || n.includes("balon de oro")) return "balonoro";
  if(n.includes("momentum")) return "momentum";
  if(n.includes("ed. limitada") || n.includes("limitada")) return "limitada";
  if(n.includes("autógrafo") || n.includes("autografo")) return "autografo";
  if(n.includes("total kings")) return "total-kings";
  if(n.includes("new master")) return "new-master";
  return "base";
}

function idsByStatus(status){
  return cards.filter(c=>getState(c.id)===status).map(c=>c.id);
}

function render(){

  grid.innerHTML="";
  let list=cards;
  const txt=search.value.toLowerCase();

  if(mode==="market"){
    const ids=txt.split(/[\/,\s]+/).filter(Boolean);
    list=cards.filter(c=>ids.includes(c.id));
  }else{
    if(txt){
      list=list.filter(c=>c.id.includes(txt)||c.name.toLowerCase().includes(txt));
    }
    if(filter.value!=="all"){
      list=list.filter(c=>getState(c.id)===filter.value);
    }
    if(typeFilter.value!=="all"){
      list=list.filter(c=>getType(c)===typeFilter.value);
    }
  }

  list.forEach(c=>{
    const st=getState(c.id);

    const div=document.createElement('div');
    div.className='card '+st;
    div.dataset.id=c.id;
    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);
    grid.appendChild(div);
  });
  updateTotals();
}

function cycle(id){
  const s=getState(id);
  const next=s==='red'?'green':s==='green'?'orange':'red';
  state[id]=next;
  queueSave();

  const cardNode=grid.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  const requiresRender = mode==="album" && filter.value!=="all" && filter.value!==next;
  if(requiresRender || !cardNode){
    render();
    return;
  }
  cardNode.classList.remove("red","orange","green");
  cardNode.classList.add(next);
  updateTotals();
}

function kp(v){
  search.value += v;
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function kpBack(){
  search.value = search.value.slice(0,-1);
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function updateModalOffset(){
  const headerEl=document.querySelector("header");
  const topOffset=headerEl ? Math.ceil(headerEl.getBoundingClientRect().height) : 0;
  document.documentElement.style.setProperty("--modal-top",`${topOffset}px`);
}

function openData(){
  updateModalOffset();
  document.getElementById("dataModal").classList.add("open");
  clearQrUi();
}

function closeData(){
  document.getElementById("dataModal").classList.remove("open");
  stopQrReader();
  clearQrUi();
}

function clearQrUi(){
  qrOut.innerHTML="";
  qrReader.innerHTML="";
}

function getInventoryPayload(){
  return {
    version:1,
    total:cards.map(c=>c.id),
    repeated:idsByStatus("orange"),
    missing:idsByStatus("red")
  };
}

function exportText(){
  const payload=JSON.stringify(getInventoryPayload());
  navigator.clipboard?.writeText(payload);
  alert("Inventari complet copiat en text.");
}

function exportQR(){
  clearQrUi();
  const payload=JSON.stringify(getInventoryPayload());
  if(typeof QRCode==="undefined"){
    qrOut.textContent=payload;
    return;
  }
  new QRCode(qrOut,{text:payload,width:220,height:220});
}

function applyImportedIds(status, ids){
  cards.forEach(c=>{
    if(ids.includes(c.id)){
      state[c.id]=status;
    }
  });
  save();
  render();
}

function normalizeImport(raw){
  const parsed=JSON.parse(raw);
  if(Array.isArray(parsed?.ids) && parsed?.status){
    return {legacy:true,status:parsed.status,ids:parsed.ids};
  }
  return {
    total:Array.isArray(parsed?.total)?parsed.total:cards.map(c=>c.id),
    repeated:Array.isArray(parsed?.repeated)?parsed.repeated:[],
    missing:Array.isArray(parsed?.missing)?parsed.missing:[]
  };
}

function applyImportedPayload(payload){
  if(payload.legacy){
    applyImportedIds(payload.status,payload.ids);
    return;
  }
  const totalSet=new Set(payload.total);
  const repSet=new Set(payload.repeated);
  const missSet=new Set(payload.missing);
  cards.forEach(c=>{
    if(missSet.has(c.id)) state[c.id]="red";
    else if(repSet.has(c.id)) state[c.id]="orange";
    else if(totalSet.has(c.id)) state[c.id]="green";
  });
  save();
  render();
}

function importText(){
  const input=prompt("Enganxa el JSON exportat (text o QR):");
  if(!input) return;
  try{
    applyImportedPayload(normalizeImport(input));
  }catch{
    alert("Format no vàlid. Cal enganxar el JSON exportat.");
  }
}

let qrScanner=null;
async function importQR(){
  clearQrUi();
  if(typeof Html5Qrcode==="undefined"){
    alert("Lector QR no disponible.");
    return;
  }
  qrScanner=new Html5Qrcode("qrReader");
  try{
    await qrScanner.start(
      {facingMode:"environment"},
      {fps:10,qrbox:220},
      (decodedText)=>{
        try{
          applyImportedPayload(normalizeImport(decodedText));
        }catch{
          alert("QR no vàlid. Cal un JSON d'exportació.");
        }
        closeData();
      }
    );
  }catch{
    alert("No s'ha pogut iniciar la càmera.");
  }
}

async function stopQrReader(){
  if(!qrScanner) return;
  try{await qrScanner.stop();}catch{}
  try{await qrScanner.clear();}catch{}
  qrScanner=null;
}

setMode("album");
toggleClearBtn();
autoGrowSearch();
updateModalOffset();
window.addEventListener("resize",updateModalOffset);
render();

</script>
