<style>
:root{
  --bg:#0e1117;
  --surface:#151a24;
  --surface-soft:#1c2331;
  --surface-strong:#252f42;
  --text:#f8fafc;
  --muted:#98a2b3;
  --accent:#6ea8fe;
  --radius:10px;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
*{-webkit-tap-highlight-color:transparent}

html, body {
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

* {
  max-width:100%;
}

body{
  font-family:'Roboto',sans-serif;
  background:radial-gradient(circle at top,#1a2233 0%,var(--bg) 45%);
  color:var(--text);
  min-height:100vh;
  overscroll-behavior:none;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:4px;
  background:rgba(14,17,23,.9);
  backdrop-filter:blur(4px);
}

.header-block{
  height:44px;
  display:flex;
  align-items:center;
  padding:0;
  background:transparent;
  border:none;
  box-shadow:none;
  border-radius:0;
}
.header-block > *{width:100%}

/* LOGO */
.logo{
  height:100%;
  display:flex;
  align-items:center;
  padding:4px 0;
}
.logo img{
  height:100%;
  max-height:36px;
}

/* ROW */
.header-row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  display:flex;
  align-items:center;
  gap:4px;
  font-weight:bold;
  font-size:14px;
}

.stat{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:40px;
  cursor:pointer;
  padding:4px 4px;
  border-radius:8px;
  transition:background .2s ease;
}
.stat:hover{background:#222a3a}

.stat i{
  width:12px;height:12px;border-radius:3px;
}

.t{color:#ecf0f1}
.g{color:#27ae60}
.o{color:#d07a18}
.r{color:#c0392b}

.t i{background:#ecf0f1}
.g i{background:#27ae60}
.o i{background:#d07a18}
.r i{background:#c0392b}

/* MODES */
.market-bar{
  width:100%;
  display:flex;
  gap:6px;
}
.market-bar button{
  flex:1;
  height:40px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-strong);
  color:var(--text);
  font-weight:bold;
  letter-spacing:.2px;
  cursor:pointer;
  transition:all .2s ease;
}
.market-bar button.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(110,168,254,.25);
}
.market-bar button:hover{
  transform:translateY(-1px);
  background:#2f3c54;
}

/* FILTERS */
.controls{
  width:100%;
  display:flex;
  gap:6px;
}

.controls select{
  flex:1;
  height:40px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-soft);
  color:var(--text);
  font-size:15px;
  padding:0 40px 0 10px;

  appearance:none;
  -webkit-appearance:none;

  background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
}

/* SEARCH */
.search-wrapper{
  width:100%;
  position:relative;
}

#search{
  width:100%;
  min-height:40px;
  max-height:120px;
  padding:10px 35px 10px 10px;
  border:1px solid #3a455c;
  border-radius:8px;
  background:var(--surface-soft);
  color:var(--text);

  font-size:16px; /* 🔥 CLAU (abans 15px) */

  resize:none;
  overflow-y:auto;
  line-height:1.25;
}

#search::placeholder{
  color:var(--muted);
}

.clear-btn{
  display:none;
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:18px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(78px,1fr));
  gap:8px;
  padding:10px;
  width:100%;
}

#keypad{
  display:none;
  padding:8px;
  background:rgba(14,17,23,.95);
  border-top:1px solid #2a3242;
}

body.market-mode #keypad{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:20;
}

body.market-mode .grid{
  padding-bottom:180px;
}

.kp-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
}

.kp-grid button{
  height:40px;
  border:1px solid #3a455c;
  border-radius:6px;
  background:var(--surface-strong);
  color:var(--text);
  font-weight:700;
  cursor:pointer;
}
.kp-grid button:hover{background:#2f3c54}

.card{
  aspect-ratio:1;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:6px;
  text-align:center;
  user-select:none;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 6px 14px rgba(0,0,0,.25);
  transition:transform .15s ease,box-shadow .15s ease;
}

.card:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 18px rgba(0,0,0,.35);
}

.card b{font-size:14px}
.card small{font-size:10px;padding:0 4px;line-height:1.2}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

/* MODAL */
.modal{
  position:fixed;
  left:0;
  right:0;
  top:var(--modal-top,0px);
  bottom:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:10px;
  z-index:30;
}
.modal.open{display:flex}

.modal-box{
  background:var(--surface);
  padding:20px;
  border-radius:12px;
  width:min(520px,92vw);
  max-height:calc(100vh - var(--modal-top,0px) - 40px);
  overflow-y:auto;
  border:1px solid #2a3242;
}

@supports (height:100dvh){
  .modal-box{
    max-height:calc(100dvh - var(--modal-top,0px) - 40px);
  }
}

.modal-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.btn-export{background:#9ad2ff;color:#001427}
.btn-import{background:#92f7b6;color:#08361b}
.btn-cancel{
  background:#555;
  color:#fff;
  appearance:none;
  -webkit-appearance:none;
}

#qrOut{
  margin-top:10px;
  display:flex;
  justify-content:center;
  min-height:130px;
  overflow:auto;
}

#qrOut pre{
  width:100%;
  white-space:pre-wrap;
  font-size:13px;
  text-align:left;
  color:var(--text);
}

#qrOut img,
#qrOut canvas{
  max-width:min(70vw,220px);
  height:auto;
}

#qrReader{
  margin-top:10px;
  min-height:220px;
}

</style>
</head>

<script type="module">
import { cards } from "./data/laliga-2026.js";

let mode="album";

// DOM refs — explicit, no implicit globals inside modules
const search      = document.getElementById("search");
const grid        = document.getElementById("grid");
const keypad      = document.getElementById("keypad");
const filter      = document.getElementById("filter");
const typeFilter  = document.getElementById("typeFilter");
const btnAlbum    = document.getElementById("btnAlbum");
const btnMarket   = document.getElementById("btnMarket");
const countT      = document.getElementById("countT");
const countG      = document.getElementById("countG");
const countO      = document.getElementById("countO");
const countR      = document.getElementById("countR");
const qrOut       = document.getElementById("qrOut");
const qrReader    = document.getElementById("qrReader");

// Approximate byte limit that keeps QR payloads reliably scannable on mobile.
/*
const MAX_QR_PAYLOAD_SIZE=2000;
*/
  
const textEncoder=new TextEncoder();
const state=JSON.parse(localStorage.getItem("cards")||"{}");
let saveTimer=null;

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}
function queueSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(save,120);
}
function autoGrowSearch(){
  search.style.height="auto";
  search.style.height=Math.min(search.scrollHeight,120)+"px";
}
function updateTotals(){
  const totals=cards.reduce((acc,c)=>{
    const st=getState(c.id);
    acc[st]=(acc[st]||0)+1;
    return acc;
  },{green:0,orange:0,red:0});
  countT.textContent=cards.length;
  countG.textContent=totals.green;
  countO.textContent=totals.orange;
  countR.textContent=totals.red;
}

function setMode(m){
  mode=m;
  btnAlbum.classList.toggle('active',m==='album');
  btnMarket.classList.toggle('active',m==='market');
  keypad.style.display=m==='market' ? "block" : "none";
  document.body.classList.toggle("market-mode",m==="market");
  search.value="";
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function quickFilter(f){
  setMode("album");
  filter.value=f;
  search.value="";
  render();
}

function clearSearch(){
  search.value="";
  autoGrowSearch();
  filter.value="all";
  typeFilter.value="all";
  setMode("album");
  toggleClearBtn();
  render();
}

function toggleClearBtn(){
  document.querySelector('.clear-btn').style.display =
    search.value.trim() ? "block":"none";
}

function getType(card){
  if(card.id && card.id.toString().trim().endsWith(" Bis")) return "Bis";
  return (card.type || "Base").trim();
}

function idsByStatus(status){
  return cards.filter(c=>getState(c.id)===status).map(c=>c.id);
}

function render(){

  grid.innerHTML="";
  let list=cards;
  const txt=search.value.toLowerCase();

  if(mode==="market"){
    const ids=txt.split(/[\/,\s]+/).filter(Boolean);
    list=cards.filter(c=>ids.includes(c.id));
  }else{
    if(txt){
      list=list.filter(c=>c.id.toLowerCase().includes(txt)||c.name.toLowerCase().includes(txt)||(c.type||"").toLowerCase().includes(txt));
    }
    if(filter.value!=="all"){
      list=list.filter(c=>getState(c.id)===filter.value);
    }
    if(typeFilter.value!=="all"){
      if(typeFilter.value==="Bis"){
        list=list.filter(c=>c.id&&c.id.toString().trim().endsWith(" Bis"));
      } else {
        list=list.filter(c=>(c.type||"Base").trim()===typeFilter.value);
      }
    }
  }

  list.forEach(c=>{
    const st=getState(c.id);

    const div=document.createElement('div');
    div.className='card '+st;
    div.dataset.id=c.id;
    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);
    grid.appendChild(div);
  });
  updateTotals();
}

function cycle(id){
  const s=getState(id);
  const next=s==='red'?'green':s==='green'?'orange':'red';
  state[id]=next;
  queueSave();

  const cardNode=grid.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  const requiresRender = mode==="album" && filter.value!=="all" && filter.value!==next;
  if(requiresRender || !cardNode){
    render();
    return;
  }
  cardNode.classList.remove("red","orange","green");
  cardNode.classList.add(next);
  updateTotals();
}

function kp(v){
  search.value += v;
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function kpBack(){
  search.value = search.value.slice(0,-1);
  autoGrowSearch();
  toggleClearBtn();
  render();
}

function updateModalOffset(){
  const headerEl=document.querySelector("header");
  const topOffset=headerEl ? Math.ceil(headerEl.getBoundingClientRect().height) : 0;
  document.documentElement.style.setProperty("--modal-top",`${topOffset}px`);
}

function openData(){
  updateModalOffset();
  document.getElementById("dataModal").classList.add("open");
  clearQrUi();
}

function closeData(){
  document.getElementById("dataModal").classList.remove("open");
  stopQrReader();
  clearQrUi();
}

function getInventoryPayload(){
  return {
    version:2,
    repeated:idsByStatus("orange"),
    missing:idsByStatus("red")
  };
}

function exportText(){
  clearQrUi();
  const payload=getInventoryPayload();
  const repSet=new Set(payload.repeated||[]);
  const missSet=new Set(payload.missing||[]);
  const repeatedLines=cards.filter(c=>repSet.has(c.id)).map(c=>`${c.id} – ${c.name}`);
  const missingLines=cards.filter(c=>missSet.has(c.id)).map(c=>`${c.id} – ${c.name}`);
  const text=[
    `🟠 REPETIDES (${repeatedLines.length}):`,
    ...(repeatedLines.length?repeatedLines:["—"]),
    "",
    `🔴 FALTEN (${missingLines.length}):`,
    ...(missingLines.length?missingLines:["—"])
  ].join("\n");
  navigator.clipboard?.writeText(text).catch(()=>{});
  const msg=document.createElement("p");
  msg.textContent="Dades copiades al portapapers";
  msg.style.color="#92f7b6";
  msg.style.textAlign="center";
  msg.style.fontSize="14px";
  qrOut.appendChild(msg);
}

function applyImportedIds(status, ids){
  cards.forEach(c=>{
    if(ids.includes(c.id)){
      state[c.id]=status;
    }
  });
  save();
  render();
}

function normalizeImport(raw){
  const parsed=JSON.parse(raw);
  if(Array.isArray(parsed?.ids) && parsed?.status){
    return {legacy:true,status:parsed.status,ids:parsed.ids};
  }
  return {
    repeated:Array.isArray(parsed?.repeated)?parsed.repeated:[],
    missing:Array.isArray(parsed?.missing)?parsed.missing:[]
  };
}

function parseFormattedTextImport(raw){
  const lines=String(raw).split(/\r?\n/);
  const repeated=[];
  const missing=[];
  let section=null;

  lines.forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed) return;

    if(trimmed.startsWith("🟠")){
      section="repeated";
      return;
    }
    if(trimmed.startsWith("🔴")){
      section="missing";
      return;
    }
    if(trimmed==="—") return;
    if(!section) return;

    const separator=trimmed.includes(" – ")?" – ":(trimmed.includes(" - ")?" - ":null);
    if(!separator) return;

    const id=trimmed.split(separator)[0].trim();
    if(!id) return;
    if(section==="repeated") repeated.push(id);
    if(section==="missing") missing.push(id);
  });

  if(!repeated.length && !missing.length){
    throw new Error("Invalid formatted import text");
  }

  return {repeated,missing};
}

function applyImportedPayload(payload){
  if(payload.legacy){
    applyImportedIds(payload.status,payload.ids);
    return;
  }
  const repSet=new Set(payload.repeated||[]);
  const missSet=new Set(payload.missing||[]);
  cards.forEach(c=>{
    if(missSet.has(c.id)) state[c.id]="red";
    else if(repSet.has(c.id)) state[c.id]="orange";
    else state[c.id]="green";
  });
  save();
  render();
}

function openImportModal(){
  document.getElementById("importInput").value="";
  document.getElementById("importModal").classList.add("open");
}
function closeImportModal(){
  document.getElementById("importModal").classList.remove("open");
}
function confirmImport(){
  const input=document.getElementById("importInput").value;
  if(!input.trim()) return;
  try{
    let payload;
    try{ payload=normalizeImport(input); }
    catch{ payload=parseFormattedTextImport(input); }
    applyImportedPayload(payload);
    closeImportModal();
    closeData();
  }catch{
    alert("Format no vàlid. Cal enganxar el text o JSON exportat.");
  }
}

// ── Expose functions needed by inline onclick handlers ──────────────────────
// Els mòduls ES6 tenen scope propi; sense això, els onclick del HTML no troben
// les funcions i llancen "ReferenceError: setMode is not defined", etc.
window.setMode        = setMode;
window.quickFilter    = quickFilter;
window.clearSearch    = clearSearch;
window.autoGrowSearch = autoGrowSearch;
window.render         = render;
window.toggleClearBtn = toggleClearBtn;

window.kpBack         = kpBack;

window.exportText     = exportText;

window.exportQR       = exportQR;

*/
  
window.openImportModal  = openImportModal;
window.closeImportModal = closeImportModal;

// ── Init ─────────────────────────────────────────────────────────────────────
setMode("album");
toggleClearBtn();
autoGrowSearch();
updateModalOffset();
window.addEventListener("resize",updateModalOffset);
render();

</script>
