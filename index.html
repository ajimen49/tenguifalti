<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADRENALYN XL 2025-2026</title>

<!-- ROBOTO -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Roboto', sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:4px;
  background:#222;
}

.header-block{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 10px;
  background:#222;
}

/* LOGO */
.logo{
  height:100%;
  display:flex;
  align-items:center;
  padding:4px 0;
}

.logo img{
  height:100%;
  max-height:48px;
}

/* ROW */
.header-row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  display:flex;
  gap:18px;
  font-weight:bold;
}
.stat{
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
}
.stat i{
  width:12px;height:12px;border-radius:3px;
}
.t i{background:#ecf0f1}
.g i{background:#27ae60}
.o i{background:#d07a18}
.r i{background:#c0392b}

/* MODES */
.market-bar{
  width:100%;
  display:flex;
  gap:6px;
}
.market-bar button{
  flex:1;
  height:40px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.market-bar button.active{
  outline:2px solid white;
}

/* FILTERS */
.controls{
  width:100%;
  display:flex;
  gap:6px;
}
.controls select{
  flex:1;
  height:40px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

/* SEARCH */
.search-wrapper{
  width:100%;
  position:relative;
}
.search-wrapper input{
  width:100%;
  height:40px;
  padding:0 35px 0 10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}
.clear-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
  padding:8px;
}

/* CARD */
.card{
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:6px;
  text-align:center;
  user-select:none;
}

.card b{
  font-size:14px;
}

.card small{
  font-size:10px;
}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.open{display:flex}
.modal-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:85%;
}
.modal-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.btn-export{background:#f9e79f;color:#000}
.btn-import{background:#f5b041;color:#000}
.btn-cancel{background:#666}

</style>
</head>

<body>

<header>

<!-- LOGO + STATS -->
<div class="header-block">
  <div class="header-row">
    <div class="logo">
      <img src="img/adrenalyn_logo.png">
    </div>

    <div class="stats">
      <span class="stat t"><i></i><span id="countT">0</span></span>
      <span class="stat g"><i></i><span id="countG">0</span></span>
      <span class="stat o"><i></i><span id="countO">0</span></span>
      <span class="stat r"><i></i><span id="countR">0</span></span>
    </div>
  </div>
</div>

<!-- MODES -->
<div class="header-block">
  <div class="market-bar">
    <button id="btnAlbum" onclick="setMode('album')">📘 ÀLBUM</button>
    <button id="btnMarket" onclick="setMode('market')">🤝 CANVIS</button>
    <button onclick="openData()">💾 DADES</button>
  </div>
</div>

<!-- FILTERS -->
<div class="header-block">
  <div class="controls">
    <select id="filter">
      <option value="all">Estat</option>
      <option value="green">Tinc</option>
      <option value="orange">Repetides</option>
      <option value="red">Falten</option>
    </select>

    <select id="typeFilter">
      <option value="all">Tipus</option>
      <option value="base">Base</option>
      <option value="vamos">Vamos</option>
      <option value="guantes">Guantes</option>
      <option value="kryptonita">Kryptonita</option>
      <option value="diamantes">Diamantes</option>
      <option value="influencers">Influencers</option>
      <option value="protas">Protas</option>
      <option value="nuevo-protas">Nuevo Protas</option>
      <option value="supercrack">Supercrack</option>
      <option value="champions">Champions</option>
      <option value="balonoro">Balón Oro</option>
      <option value="momentum">Momentum</option>
      <option value="limitada">Limitada</option>
      <option value="autografo">Autógrafos</option>
      <option value="total-kings">Total Kings</option>
      <option value="new-master">New Master</option>
    </select>
  </div>
</div>

<!-- SEARCH -->
<div class="header-block">
  <div class="search-wrapper">
    <input id="search" oninput="render()">
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="dataModal">
  <div class="modal-box">
    <button class="btn-export" onclick="exportQR()">Exporta QR</button>
    <button class="btn-export" onclick="exportText()">Exporta text</button>
    <button class="btn-import" onclick="importQR()">Importa QR</button>
    <button class="btn-import" onclick="importText()">Importa text</button>
    <button class="btn-cancel" onclick="closeData()">Cancel·la</button>
  </div>
</div>

<script>

let mode="album";

const state = JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}

function setMode(m){
  mode=m;

  btnAlbum.classList.toggle('active',m==='album');
  btnMarket.classList.toggle('active',m==='market');

  search.value="";
  render();
}

function clearSearch(){search.value='';render();}

function openData(){dataModal.classList.add('open')}
function closeData(){dataModal.classList.remove('open')}

function render(){

  grid.innerHTML="";

  let list = cards;
  const txt = search.value.toLowerCase();

  if(mode==="market"){
    const ids = txt.split(/[\/,\s]+/).filter(Boolean);
    list = cards.filter(c => ids.includes(c.id));
  }else{
    if(txt){
      list = list.filter(c =>
        c.id.includes(txt) ||
        c.name.toLowerCase().includes(txt)
      );
    }

    if(filter.value!=="all"){
      list = list.filter(c => getState(c.id)===filter.value);
    }

    if(typeFilter.value!=="all"){
      list = list.filter(c => getType(c)===typeFilter.value);
    }
  }

  let g=0,o=0,r=0;

  list.forEach(c=>{
    const st=getState(c.id);

    if(st==='green')g++;
    else if(st==='orange')o++;
    else r++;

    const div=document.createElement('div');
    div.className='card '+st;
    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);

    grid.appendChild(div);
  });

  countT.textContent=cards.length;
  countG.textContent=g;
  countO.textContent=o;
  countR.textContent=r;
}

function cycle(id){
  const s=getState(id);
  state[id]=s==='red'?'green':s==='green'?'orange':'red';
  save();
  render();
}

render();

</script>

</body>
</html>
