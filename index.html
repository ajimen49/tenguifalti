<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADRENALYN XL</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  font-family:Arial;
  background:#111;
  color:#fff;
  touch-action:manipulation;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#222;
  padding:10px;
  z-index:10;
}

.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:bold;
}

.stat{
  display:flex;
  align-items:center;
  gap:4px;
  cursor:pointer;
}

.stat i{
  width:10px;
  height:10px;
  border-radius:2px;
}

.stat.t i{background:#ecf0f1}
.stat.g i{background:#27ae60}
.stat.o i{background:#d07a18}
.stat.r i{background:#c0392b}

.sep{
  opacity:.4;
}

/* SEARCH */
.search-wrapper{position:relative;margin-top:6px}
.search-wrapper input{
  width:100%;
  padding:10px 35px 10px 10px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
  font-size:16px;
}
.clear-btn{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.controls select{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
}

/* MODE BUTTONS */
.market-bar{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.market-bar button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
}

.market-bar button.active{
  outline:2px solid white;
  box-shadow:0 0 6px rgba(255,255,255,.4);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
  padding:8px;
  padding-bottom:120px;
}

.card{
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  padding-top:6px;
  text-align:center;
}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

.card b{font-size:14px}
.card small{
  font-size:9px;
  display:block;
}

/* eliminar punts */
.card,.card *{
  text-decoration:none !important;
  border-bottom:none !important;
}

/* KEYPAD */
#keypad{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  padding:6px;
  border-top:1px solid #333;
}

.kp-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.kp-grid button{
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#444;
  color:white;
  -webkit-tap-highlight-color:transparent;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.open{display:flex}
.modal-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:80%;
}
.modal-box button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
}
.btn-red{background:#c0392b}
.btn-orange{background:#d07a18}

/* ROTATION */
#rotateWarning{
  position:fixed;
  inset:0;
  background:#111;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
@media (orientation: landscape){
  #rotateWarning{display:flex}
  body>*:not(#rotateWarning){display:none !important}
}
</style>
</head>

<body>

<header>

<div class="header-row">
  <h1>
  🃏 
  <span class="title-yellow">ADRENALYN</span>
  <span class="title-orange">XL</span>
  </h1>

  <div class="stats">
    <span class="stat t" onclick="filterByState('all')"><i></i><span id="countT">0</span></span>
    <span class="sep">|</span>
    <span class="stat g" onclick="filterByState('green')"><i></i><span id="countG">0</span></span>
    <span class="sep">|</span>
    <span class="stat o" onclick="filterByState('orange')"><i></i><span id="countO">0</span></span>
    <span class="sep">|</span>
    <span class="stat r" onclick="filterByState('red')"><i></i><span id="countR">0</span></span>
  </div>
</div>

<div class="market-bar">
<button id="btnAlbum" onclick="setMode('album')">📘 Àlbum</button>
<button id="btnMarket" onclick="setMode('market')">🤝 Mercat</button>
<button onclick="openExport()">📤 Exportar</button>
</div>

<div class="search-wrapper">
<input id="search" placeholder="Cerca...">
<button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<div class="controls">
<select id="filter">
<option value="all">Estat</option>
<option value="green">Tinc</option>
<option value="orange">Repetides</option>
<option value="red">Falten</option>
</select>

<select id="typeFilter">
<option value="all">Tipus</option>
<option value="base">Base</option>
<option value="vamos">Vamos</option>
<option value="guantes">Guantes</option>
<option value="kryptonita">Kryptonita</option>
<option value="diamantes">Diamantes</option>
<option value="influencers">Influencers</option>
<option value="protas">Protas</option>
<option value="supercrack">Supercrack</option>
<option value="champions">Champions</option>
<option value="balonoro">Balón Oro</option>
<option value="momentum">Momentum</option>
<option value="limitada">Limitada</option>
<option value="autografo">Autógrafos</option>
<option value="total-kings">Total Kings</option>
<option value="new-master">New Master</option>
</select>
</div>

</header>

<div class="grid" id="grid"></div>

<div id="keypad" style="display:none;">
  <div class="kp-grid">
    <button onclick="kp('1')">1</button>
    <button onclick="kp('2')">2</button>
    <button onclick="kp('3')">3</button>
    <button onclick="kp('4')">4</button>
    <button onclick="kp('5')">5</button>
    <button onclick="kp('6')">6</button>
    <button onclick="kp('7')">7</button>
    <button onclick="kp('8')">8</button>
    <button onclick="kp('9')">9</button>
    <button onclick="kp(' / ')">/</button>
    <button onclick="kp('0')">0</button>
    <button onclick="kpBack()">⌫</button>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-box">
    <button class="btn-red" onclick="exportMissing()">LES QUE FALTEN</button>
    <button class="btn-orange" onclick="exportRepeats()">LES REPETIDES</button>
    <button onclick="closeExport()">CANCEL·LA</button>
  </div>
</div>

<div id="rotateWarning">Gira el dispositiu 📱</div>

<script>

// 👉 enganxa aquí
// const cards = []

const state = JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}

let mode="album";

function setMode(m){
  mode=m;

  document.getElementById('btnAlbum').classList.toggle('active',m==='album');
  document.getElementById('btnMarket').classList.toggle('active',m==='market');

  document.getElementById('search').value='';
  document.getElementById('keypad').style.display = m==="market"?"block":"none";

  render();
}

function filterByState(s){
  setMode('album');
  document.getElementById('filter').value=s;
  render();
}

function clearSearch(){
  document.getElementById('search').value='';
  render();
}

function kp(v){
  document.getElementById('search').value+=v;
  render();
}

function kpBack(){
  const i=document.getElementById('search');
  i.value=i.value.slice(0,-1);
  render();
}

function getType(c){
  const n=parseInt(c.id);
  const name=c.name.toLowerCase();

  if(!isNaN(n)){
    if(n<=360)return'base';
    if(n<=380)return'vamos';
    if(n<=387)return'guantes';
    if(n<=396)return'kryptonita';
    if(n<=414)return'diamantes';
    if(n<=423)return'influencers';
    if(n<=441)return'protas';
    if(n<=467)return'supercrack';
    if(n===468)return'champions';
    if(n<=474)return'balonoro';
  }

  if(name.includes('momentum'))return'momentum';
  if(name.includes('limitada'))return'limitada';
  if(name.includes('autógrafo'))return'autografo';
  if(c.id.startsWith('TK/'))return'total-kings';
  if(c.id.startsWith('NM/'))return'new-master';

  return'base';
}

function cycle(id){
  const s=getState(id);
  state[id]=s==='red'?'green':s==='green'?'orange':'red';
  save();
  render();
}

function openExport(){document.getElementById('exportModal').classList.add('open')}
function closeExport(){document.getElementById('exportModal').classList.remove('open')}

function exportMissing(){
  alert(cards.filter(c=>getState(c.id)==='red').map(c=>c.id).join(", "));
  closeExport();
}

function exportRepeats(){
  alert(cards.filter(c=>getState(c.id)==='orange').map(c=>c.id).join(", "));
  closeExport();
}

function render(){

  const grid=document.getElementById('grid');
  grid.innerHTML="";

  let g=0,o=0,r=0;

  const search=document.getElementById('search').value.toLowerCase();
  const filter=document.getElementById('filter').value;
  const type=document.getElementById('typeFilter').value;

  const nums=search.split(/[\/]/).map(n=>n.trim()).filter(Boolean);

  cards.forEach(c=>{
    const st=getState(c.id);

    if(st==='green')g++;
    else if(st==='orange')o++;
    else r++;

    if(mode==="market"){
      if(!nums.length)return;
      if(!nums.includes(c.id))return;
    }

    if(mode==="album" && filter!=='all' && st!==filter)return;
    if(type!=='all' && getType(c)!==type)return;

    if(mode==="album" && search && !c.name.toLowerCase().includes(search) && !c.id.includes(search))return;

    const div=document.createElement('div');
    div.className='card '+st;

    if(mode==="market" && st==="red")div.style.opacity=0.5;

    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);

    grid.appendChild(div);
  });

  document.getElementById('countT').textContent=cards.length;
  document.getElementById('countG').textContent=g;
  document.getElementById('countO').textContent=o;
  document.getElementById('countR').textContent=r;
}

document.getElementById('search').addEventListener('input',render);
document.getElementById('filter').addEventListener('change',render);
document.getElementById('typeFilter').addEventListener('change',render);

setMode('album');

</script>

</body>
</html>
