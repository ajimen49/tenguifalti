<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADRENALYN XL 2025-2026</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Roboto',sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:4px;
  background:#222;
}

.header-block{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 10px;
}

/* LOGO */
.logo{
  height:100%;
  display:flex;
  align-items:center;
  padding:4px 0;
}
.logo img{
  height:100%;
  max-height:48px;
}

/* ROW */
.header-row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* STATS */
.stats{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
  font-size:14px;
}

.stat{
  display:flex;
  align-items:center;
  gap:6px;
  min-width:48px;
  cursor:pointer;
}

.stat i{
  width:12px;height:12px;border-radius:3px;
}

.t{color:#ecf0f1}
.g{color:#27ae60}
.o{color:#d07a18}
.r{color:#c0392b}

.t i{background:#ecf0f1}
.g i{background:#27ae60}
.o i{background:#d07a18}
.r i{background:#c0392b}

.sep{opacity:.5}

/* MODES */
.market-bar{
  width:100%;
  display:flex;
  gap:6px;
}
.market-bar button{
  flex:1;
  height:40px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
  font-weight:bold;
}
.market-bar button.active{
  outline:2px solid white;
}

/* FILTERS */
.controls{
  width:100%;
  display:flex;
  gap:6px;
}

.controls select{
  flex:1;
  height:40px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  font-size:16px;
  padding:0 40px 0 10px;

  appearance:none;
  -webkit-appearance:none;

  background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
}

/* SEARCH */
.search-wrapper{
  width:100%;
  position:relative;
}

#search{
  width:100%;
  height:40px;
  padding:0 35px 0 10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  font-size:16px;
}

.clear-btn{
  display:none;
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
  padding:8px;
}

.card{
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:6px;
  text-align:center;
  user-select:none;
}

.card b{font-size:14px}
.card small{font-size:10px}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.open{display:flex}

.modal-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:85%;
}

.modal-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.btn-export{background:#f9e79f;color:#000}
.btn-import{background:#f5b041;color:#000}
.btn-cancel{
  background:#555;
  color:#fff;
  appearance:none;
  -webkit-appearance:none;
}

</style>
</head>

<body>

<header>

<div class="header-block">
  <div class="header-row">
    <div class="logo">
      <img src="img/adrenalyn_logo.png">
    </div>

    <div class="stats">
      <span class="stat t" onclick="quickFilter('all')"><i></i><span id="countT">0</span></span>
      <span class="sep">|</span>
      <span class="stat g" onclick="quickFilter('green')"><i></i><span id="countG">0</span></span>
      <span class="sep">|</span>
      <span class="stat o" onclick="quickFilter('orange')"><i></i><span id="countO">0</span></span>
      <span class="sep">|</span>
      <span class="stat r" onclick="quickFilter('red')"><i></i><span id="countR">0</span></span>
    </div>
  </div>
</div>

<div class="header-block">
  <div class="market-bar">
    <button id="btnAlbum" onclick="setMode('album')">📘 ÀLBUM</button>
    <button id="btnMarket" onclick="setMode('market')">🤝 CANVIS</button>
    <button onclick="openData()">💾 DADES</button>
  </div>
</div>

<div class="header-block">
  <div class="controls">
    <select id="filter" onchange="render()">
      <option value="all">Totes</option>
      <option value="green">Tinc</option>
      <option value="orange">Repetides</option>
      <option value="red">Falten</option>
    </select>

    <select id="typeFilter" onchange="render()">
      <option value="all">Tipus</option>
      <option value="base">Base</option>
      <option value="vamos">Vamos</option>
      <option value="guantes">Guantes</option>
      <option value="kryptonita">Kryptonita</option>
      <option value="diamantes">Diamantes</option>
      <option value="influencers">Influencers</option>
      <option value="protas">Protas</option>
      <option value="nuevo-protas">Nuevo Protas</option>
      <option value="supercrack">Supercrack</option>
      <option value="champions">Champions</option>
      <option value="balonoro">Balón Oro</option>
      <option value="momentum">Momentum</option>
      <option value="limitada">Limitada</option>
      <option value="autografo">Autógrafos</option>
      <option value="total-kings">Total Kings</option>
      <option value="new-master">New Master</option>
    </select>
  </div>
</div>

<div class="header-block">
  <div class="search-wrapper">
    <input id="search" oninput="render();toggleClearBtn()">
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

</header>

<div class="grid" id="grid"></div>

<script>

let mode="album";
const state=JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}

function setMode(m){
  mode=m;
  btnAlbum.classList.toggle('active',m==='album');
  btnMarket.classList.toggle('active',m==='market');
  search.value="";
  render();
}

function quickFilter(f){
  mode="album";
  filter.value=f;
  search.value="";
  render();
}

function clearSearch(){
  search.value="";
  filter.value="all";
  typeFilter.value="all";
  mode="album";
  toggleClearBtn();
  render();
}

function toggleClearBtn(){
  document.querySelector('.clear-btn').style.display =
    search.value.trim() ? "block":"none";
}

function render(){

  grid.innerHTML="";
  let list=cards;
  const txt=search.value.toLowerCase();

  if(mode==="market"){
    const ids=txt.split(/[\/,\s]+/).filter(Boolean);
    list=cards.filter(c=>ids.includes(c.id));
  }else{
    if(txt){
      list=list.filter(c=>c.id.includes(txt)||c.name.toLowerCase().includes(txt));
    }
    if(filter.value!=="all"){
      list=list.filter(c=>getState(c.id)===filter.value);
    }
  }

  let g=0,o=0,r=0;

  list.forEach(c=>{
    const st=getState(c.id);
    if(st==='green')g++;
    else if(st==='orange')o++;
    else r++;

    const div=document.createElement('div');
    div.className='card '+st;
    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);
    grid.appendChild(div);
  });

  countT.textContent=cards.length;
  countG.textContent=g;
  countO.textContent=o;
  countR.textContent=r;
}

function cycle(id){
  const s=getState(id);
  state[id]=s==='red'?'green':s==='green'?'orange':'red';
  save();render();
}

toggleClearBtn();
render();

</script>

</body>
</html>
