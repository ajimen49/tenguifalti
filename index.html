<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADRENALYN XL</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Roboto',sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:4px;
  background:#222;
}

.header-block{
  height:44px;
  display:flex;
  align-items:center;
  padding:0 8px;
}

/* LOGO */
.logo{width:25%}
.logo img{width:100%;max-height:40px}

/* STATS */
.stats{
  flex:1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.stat{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  font-weight:bold;
  cursor:pointer;
}
.stat i{width:10px;height:10px;border-radius:2px}

.t{color:#ecf0f1}.t i{background:#ecf0f1}
.g{color:#27ae60}.g i{background:#27ae60}
.o{color:#d07a18}.o i{background:#d07a18}
.r{color:#c0392b}.r i{background:#c0392b}

/* MODES */
.market-bar{display:flex;gap:6px;width:100%}
.market-bar button{
  flex:1;height:36px;border:none;border-radius:6px;
  background:#444;color:white;font-weight:bold;
}
.market-bar button.active{outline:2px solid white}

/* FILTERS */
.controls{display:flex;gap:6px;width:100%}

.controls select{
  flex:1;height:36px;border:none;border-radius:6px;
  background:#333;color:white;font-size:15px;
  padding:0 35px 0 8px;
  appearance:none;
}

/* SEARCH */
.search-wrapper{position:relative;width:100%}

#search{
  width:100%;
  min-height:36px;
  padding:6px 35px 6px 8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  font-size:16px;

  white-space:pre-wrap;
  overflow-wrap:break-word;
}

.clear-btn{
  display:none;
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#aaa;
  font-size:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
  padding:8px;
}

/* CARD */
.card{
  aspect-ratio:1;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:6px;
  text-align:center;
}
.card b{font-size:14px}
.card small{font-size:10px}

.red{background:#c0392b}
.orange{background:#d07a18}
.green{background:#27ae60}

/* KEYPAD */
#keypad{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#111;
  padding:6px;
  display:none;
}
.kp-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
.kp-grid button{
  padding:12px;
  font-size:18px;
  border:none;border-radius:8px;
  background:#444;color:white;
}

/* MODAL */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.open{display:flex}

.modal-box{
  background:#222;padding:20px;border-radius:10px;width:85%;
}
.modal-box button{
  width:100%;margin-top:10px;padding:12px;
  border:none;border-radius:6px;font-weight:bold;
}

.btn-export{background:#f9e79f;color:#000}
.btn-import{background:#f5b041;color:#000}
.btn-cancel{background:#555;color:#fff}

</style>
</head>

<body>

<header>

<div class="header-block">
  <div class="logo"><img src="img/adrenalyn_logo.png"></div>
  <div class="stats">
    <span class="stat t" onclick="quickFilter('all')"><i></i><span id="countT"></span></span>
    <span class="stat g" onclick="quickFilter('green')"><i></i><span id="countG"></span></span>
    <span class="stat o" onclick="quickFilter('orange')"><i></i><span id="countO"></span></span>
    <span class="stat r" onclick="quickFilter('red')"><i></i><span id="countR"></span></span>
  </div>
</div>

<div class="header-block">
  <div class="market-bar">
    <button id="btnAlbum" onclick="setMode('album')">📘 ÀLBUM</button>
    <button id="btnMarket" onclick="setMode('market')">🤝 CANVIS</button>
    <button onclick="openData()">💾 DADES</button>
  </div>
</div>

<div class="header-block">
  <div class="controls">
    <select id="filter" onchange="render()">
      <option value="all">Totes</option>
      <option value="green">Tinc</option>
      <option value="orange">Repetides</option>
      <option value="red">Falten</option>
    </select>

    <select id="typeFilter" onchange="render()">
      <option value="all">Tipus</option>
      <option value="base">Base / Escuts / Stadium / Bis</option>
      <option value="vamos">¡Vamos!</option>
      <option value="guantes">Guantes de Oro</option>
      <option value="kryptonita">Kryptonita</option>
      <option value="diamantes">Diamantes</option>
      <option value="influencers">Influencers</option>
      <option value="protas">Protas</option>
      <option value="supercrack">Supercracks</option>
      <option value="ultra">Ultra Especials</option>
      <option value="momentum">Momentum</option>
      <option value="miticos">Míticos</option>
      <option value="extra">Extra Gold</option>
      <option value="newmaster">New Master</option>
      <option value="limitada">Ed. Limitada</option>
      <option value="autografo">Autógrafos</option>
    </select>

  </div>
</div>

<div class="header-block">
  <div class="search-wrapper">
    <input id="search" oninput="render();toggleClearBtn()">
    <button class="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

</header>

<div class="grid" id="grid"></div>

<div id="keypad">
  <div class="kp-grid">
    <button onclick="kp('1')">1</button>
    <button onclick="kp('2')">2</button>
    <button onclick="kp('3')">3</button>
    <button onclick="kp('4')">4</button>
    <button onclick="kp('5')">5</button>
    <button onclick="kp('6')">6</button>
    <button onclick="kp('7')">7</button>
    <button onclick="kp('8')">8</button>
    <button onclick="kp('9')">9</button>
    <button onclick="kp(' / ')">/</button>
    <button onclick="kp('0')">0</button>
    <button onclick="kp('⌫')">⌫</button>
  </div>
</div>

<div class="modal" id="dataModal">
  <div class="modal-box">
    <button class="btn-export" onclick="exportText()">Exportar text</button>
    <button class="btn-import" onclick="importText()">Importar text</button>
    <button class="btn-cancel" onclick="closeData()">Cancel·la</button>
  </div>
</div>

<script>

const cards = []; // enganxa aquí

let mode="album";
const state=JSON.parse(localStorage.getItem("cards")||"{}");

function getState(id){return state[id]||"red"}
function save(){localStorage.setItem("cards",JSON.stringify(state))}

function setMode(m){
  mode=m;
  btnAlbum.classList.toggle('active',m==='album');
  btnMarket.classList.toggle('active',m==='market');
  keypad.style.display=(m==="market")?"block":"none";
  search.value="";
  render();
}

function kp(v){
  if(v==="⌫") search.value=search.value.slice(0,-1);
  else search.value+=v;
  toggleClearBtn();
  render();
}

function toggleClearBtn(){
  document.querySelector('.clear-btn').style.display =
    search.value.trim()?"block":"none";
}

function clearSearch(){
  search.value="";
  filter.value="all";
  typeFilter.value="all";
  render();
}

function quickFilter(f){
  filter.value=f;
  render();
}

function render(){

  grid.innerHTML="";
  let list=cards;
  const txt=search.value.toLowerCase();

  if(mode==="market"){
    const ids=txt.split(/\s*\/\s*/).filter(Boolean);
    list=cards.filter(c=>ids.includes(c.id));
  }else{
    if(txt){
      list=list.filter(c=>c.id.includes(txt)||c.name.toLowerCase().includes(txt));
    }
    if(filter.value!=="all"){
      list=list.filter(c=>getState(c.id)===filter.value);
    }
  }

  let g=0,o=0,r=0;

  list.forEach(c=>{
    const st=getState(c.id);
    if(st==='green')g++;
    else if(st==='orange')o++;
    else r++;

    const div=document.createElement('div');
    div.className='card '+st;
    div.innerHTML=`<b>${c.id}</b><small>${c.name}</small>`;
    div.onclick=()=>cycle(c.id);
    grid.appendChild(div);
  });

  countT.textContent=cards.length;
  countG.textContent=g;
  countO.textContent=o;
  countR.textContent=r;
}

function cycle(id){
  const s=getState(id);
  state[id]=s==='red'?'green':s==='green'?'orange':'red';
  save();render();
}

function openData(){dataModal.classList.add('open')}
function closeData(){dataModal.classList.remove('open')}

function exportText(){
  const falt=cards.filter(c=>getState(c.id)==='red').map(c=>c.id);
  const rep=cards.filter(c=>getState(c.id)==='orange').map(c=>c.id);
  alert(`FALTEN: ${falt.join(" / ")}\nREPETIDES: ${rep.join(" / ")}`);
}

function importText(){
  const txt=prompt("Enganxa dades");
  if(!txt)return;

  txt.match(/FALTEN:\s*([0-9\s\/]+)/i)?.[1]
    ?.split(/\s*\/\s*/).forEach(id=>state[id.trim()]='red');

  txt.match(/REPETIDES:\s*([0-9\s\/]+)/i)?.[1]
    ?.split(/\s*\/\s*/).forEach(id=>state[id.trim()]='orange');

  save();render();
}

toggleClearBtn();
render();

</script>

</body>
</html>
